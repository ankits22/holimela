<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Holi Mela 2026 – Vendor QR Codes</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #fff;
      color: #1a0a2e;
    }
    @page { size: A4; margin: 16mm; }
    .page {
      page-break-after: always;
      break-after: page;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .page:last-child {
      page-break-after: avoid;
      break-after: avoid;
    }
    .qr-card {
      width: 100%;
      max-width: 680px;
      border: 4px solid #e91e8c;
      border-radius: 32px;
      padding: 56px 52px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      box-shadow: 0 8px 36px rgba(233,30,140,0.16);
    }
    .qr-win {
      font-size: 1.5rem;
      color: #ff6b35;
      font-weight: 700;
    }
    .qr-logo-wrap {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-logo {
      max-height: 140px;
      max-width: 340px;
      object-fit: contain;
    }
    .qr-logo-text {
      font-size: 3rem;
      font-weight: 800;
      color: #e91e8c;
    }
    .qr-name {
      font-size: 1.9rem;
      font-weight: 700;
      color: #1a0a2e;
      line-height: 1.3;
    }
    .qr-box { display: flex; justify-content: center; }
    .qr-box canvas, .qr-box img { border-radius: 10px; }
    .qr-instr {
      font-size: 1.3rem;
      color: #e91e8c;
      font-weight: 600;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script>
  var BASE = 'https://louisvilleholi.com';
  var VENDORS = [
    { id: 'gj2',             token: 'mV7xK2pN9qR4tY8w', name: 'GJ 2 Indian Street Food',      logo: 'images/GJ2Logo.jpg' },
    { id: 'clay-oven',       token: 'jH3nL6sB0cF5uW1e', name: 'Clay Oven',                     logo: 'images/clayovenlogo.jpg' },
    { id: 'haus-kaphi',      token: 'dA4kG8yT2oE7iX9z', name: 'Haus Kaphi',                    logo: 'images/HausKaphiLogo.jpeg' },
    { id: 'htky',            token: 'rP5vC1mJ6bQ3nZ0f', name: 'HTKY Dosa',                     logo: 'images/HTKY_Dosa.jpeg' },
    { id: 'hindi-pathshala', token: 'lU2wS9hD4gK7tR8y', name: 'Louisville Hindi Pathshala',    logo: 'images/HindiPaathshalalogo.jpeg' },
    { id: 'jai-hind',        token: 'bT8nX3wQ6yF1mK4r', name: 'Jai Hind',                      logo: 'images/Jaihind.jpeg' },
    { id: 'everest-momo',    token: 'eN6aM3xI0pV5cB1q', name: 'Everest Momo',                  logo: 'images/EverestMomoLogo.jpeg' },
    { id: 'rsm',             token: 'Xk9Lp2Wv7nY4cB8j', name: 'Russian School of Math',        logo: 'images/rsm.png' },
    { id: 'rasa',            token: 'Qm3Hn6Zt1fJ8wD5e', name: 'Rasa & Co LLC',                 logo: '', abbr: 'RASA' },
    { id: 'purejoy',         token: 'Vc4Kg9Ex2sM7rN1a', name: 'PureJoy Jewelry',               logo: '', abbr: 'PureJoy' },
    { id: 'kumon',           token: 'Yb7Tf0Ap5uI3qH6c', name: 'Kumon',                         logo: 'images/kumon.jpg' },
    { id: 'taattva',         token: 'Rd2Ow8Gj4eL6xC9s', name: 'Taattva',                       logo: '', abbr: 'Taattva' },
    { id: 'mudra-wealth',    token: 'Pn5Sk1Ub7mF3vZ0t', name: 'Mudra Wealth Creation',         logo: '', abbr: 'MUDRA' },
    { id: 'happy-col',       token: 'Wg6Ec4Jy0aQ2tX8n', name: 'Happy Collections',             logo: '', abbr: 'Happy' },
    { id: 'save-soil',       token: 'Lf3Mn9Dh5iO7kR1p', name: 'Save Soil',                     logo: 'images/savesoil.png' },
    { id: 'laxmi-mgmt',      token: 'Ax1Bv7Cw2Dy3Ez4q', name: 'Laxmi Management',              logo: '', abbr: 'LAXMI' },
    { id: 'ascendia',        token: 'Zp8Qr2Tn5Uj9Vk1Lw', name: 'Ascendia Financial Solutions', logo: 'images/Ascendia.jpg' },
  ];

  var root = document.getElementById('root');

  VENDORS.forEach(function(v) {
    var url = BASE + '/?stamp=' + v.id + '&t=' + v.token;
    var abbr = v.abbr || v.name.substring(0, 4).toUpperCase();
    var logoHtml = v.logo
      ? '<img src="' + v.logo + '" alt="' + v.name + '" class="qr-logo" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">' +
        '<span class="qr-logo-text" style="display:none">' + abbr + '</span>'
      : '<span class="qr-logo-text">' + abbr + '</span>';

    var page = document.createElement('div');
    page.className = 'page';

    var card = document.createElement('div');
    card.className = 'qr-card';
    card.innerHTML =
      '<div class="qr-win">🏆 Scan QR code to win exciting prizes!</div>' +
      '<div class="qr-logo-wrap">' + logoHtml + '</div>' +
      '<div class="qr-name">' + v.name + '</div>' +
      '<div class="qr-box" id="qr-' + v.id + '"></div>' +
      '<div class="qr-instr">📱 Scan to collect your Holi Mela stamp!</div>';

    page.appendChild(card);
    root.appendChild(page);

    new QRCode(document.getElementById('qr-' + v.id), {
      text: url,
      width: 380,
      height: 380,
      colorDark: '#1a0a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  });
</script>
</body>
</html>
